version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: alphadesk-postgres
    environment:
      POSTGRES_DB: alphadesk
      POSTGRES_USER: alphadesk
      POSTGRES_PASSWORD: alphadesk_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphadesk"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alphadesk-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: alphadesk-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alphadesk.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alphadesk-network

volumes:
  pgdata:

networks:
  alphadesk-network:
    driver: bridge
