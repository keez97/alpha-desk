[pytest]
# Pytest configuration for AlphaDesk tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directory
testpaths = backend/tests

# Markers for different test categories
markers =
    unit: Unit tests (fast, no dependencies)
    integration: Integration tests (may require database)
    api: API endpoint tests
    pit: Point-in-Time query tests
    slow: Slow running tests

# Minimum Python version
minversion = 7.0

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Coverage options (if using pytest-cov)
# addopts = --cov=backend --cov-report=html --cov-report=term-missing

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
